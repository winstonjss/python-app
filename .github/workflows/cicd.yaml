name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - master

jobs:
  ci:    
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v3
      - 
        name: Set Short SHA
        id: vars
        run: echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT 
      - 
        name: Check output
        run: echo ${{ steps.vars.outputs.COMMIT_ID }} 
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: winstonjss15/python-app:${{ steps.vars.outputs.COMMIT_ID }}
    outputs:
      commit_id: ${{ steps.vars.outputs.COMMIT_ID }}
  cd:
    needs: ci
    runs-on: self-hosted

    steps:    
      - uses: actions/checkout@v3

      - 
        name: Install pip
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip                  
      -
        name: Modify values file
        shell: bash
        run: |
          echo "Update tag: ${{ needs.ci.outputs.commit_id }}"
          python3 -m pip install yq --break-system-packages
          yq -Yi '.image.tag = "${{needs.ci.outputs.commit_id}}"' charts/python-app/values.yaml      - 
        name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Updates values.ymal with commit ${{ needs.ci.outputs.commit_id }}'
      -
        name: Install argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd
      -
        name: Argo cd sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure --grpc-web \
            --username ${{secrets.ARGO_CD_USER}} --password ${{secrets.ARGO_CD_PASSWORD}}
          argocd app sync python-app
